name: Sync to HuggingFace Space

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'rag_engine/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'supabase_migrations/**'

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Overwrite README for HuggingFace
        run: |
          cat > README.md << 'EOF'
          ---
          title: PolicyLens RAG API
          emoji: 📄
          colorFrom: blue
          colorTo: indigo
          sdk: docker
          pinned: false
          ---
          EOF

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "jhawardev11@gmail.com"
          git config --global user.name "DEVJHAWAR11"
          git add README.md
          git commit -m "ci: set HF Space README config" || true
          git remote add hf https://DEVJHAWAR11:${HF_TOKEN}@huggingface.co/spaces/devjhawar/policylens-rag-api
          git push hf main --force
